name: astrbot_plugin_group_relations
desc: 给llm提供的群身份/用户画像插件，支持主动注入/工具搜索。除了可编辑的用户画像外，还可以让llm理解自己群内的身份，记住群主是谁，以及明确用户是否为admin。.
help: Use /关系 help to manage and query relationship memory.
version: v0.3.0
author: Codex
repo: "https://github.com/yun474/astrbot_plugin_group_relations"
display_name: 群关系记忆
short_desc: 分群管理群内人物关系、身份和用户画像。
astrbot_version: ">=4.9.2"
support_platforms:
  - aiocqhttp
  - qq_official
  - telegram
  - discord
  - satori
