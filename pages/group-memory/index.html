<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>群关系记忆管理</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <h1>群关系记忆</h1>
            <p id="pluginName">astrbot_plugin_group_relations</p>
          </div>
          <button class="icon-button" id="refreshButton" title="刷新">↻</button>
        </div>
        <label class="search">
          <span>筛选群</span>
          <input id="groupFilter" type="search" placeholder="群名 / ID" />
        </label>
        <div class="group-list" id="groupList"></div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow">当前群空间</p>
            <h2 id="groupTitle">未选择</h2>
          </div>
          <div class="stats" id="stats"></div>
        </header>

        <section class="panel" id="groupPanel" data-panel="group">
          <div class="section-head">
            <button class="panel-toggle" type="button" data-action="toggle-panel" aria-expanded="true">
              <span>群空间</span>
              <span class="chevron">⌄</span>
            </button>
            <button class="primary" id="saveGroupButton">保存群信息</button>
          </div>
          <div class="panel-body">
            <div class="grid two">
              <label>
                <span>显示名称</span>
                <input id="groupName" />
              </label>
              <label>
                <span>类型</span>
                <select id="groupKind">
                  <option value="group">群聊</option>
                  <option value="private">私聊</option>
                  <option value="global">全局</option>
                </select>
              </label>
              <label>
                <span>群主用户 ID</span>
                <input id="groupOwnerId" />
              </label>
              <label>
                <span>群主显示名</span>
                <input id="groupOwnerName" />
              </label>
              <label>
                <span>群主来源</span>
                <input id="groupOwnerEvidence" />
              </label>
            </div>
          </div>
        </section>

        <section class="panel" data-panel="relations">
          <div class="section-head">
            <button class="panel-toggle" type="button" data-action="toggle-panel" aria-expanded="true">
              <span>关系</span>
              <span class="chevron">⌄</span>
            </button>
            <button class="primary" id="addRelationButton">新增关系</button>
          </div>
          <div class="panel-body">
            <div class="table" id="relationTable"></div>
          </div>
        </section>

        <section class="panel" data-panel="members">
          <div class="section-head">
            <button class="panel-toggle" type="button" data-action="toggle-panel" aria-expanded="false">
              <span>群成员目录</span>
              <span class="chevron">⌄</span>
            </button>
            <div class="section-actions">
              <button class="secondary" type="button" data-action="refresh-members-card">按群名片重新获取</button>
              <button class="secondary" type="button" data-action="refresh-members-nickname">按 QQ 名称重新获取</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="members" id="memberList"></div>
          </div>
        </section>

        <section class="panel" data-panel="profiles">
          <div class="section-head">
            <button class="panel-toggle" type="button" data-action="toggle-panel" aria-expanded="true">
              <span>用户画像</span>
              <span class="chevron">⌄</span>
            </button>
            <button class="primary" id="addProfileButton">新增画像</button>
          </div>
          <div class="panel-body">
            <div class="profiles" id="profileList"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" hidden></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
